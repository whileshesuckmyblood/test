# .gitlab-ci.yml
stages:
  - test
  - build
variables:
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE:latest"

test:
  stage: test
  image: python:3.11
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pytest tests
build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t telegram-bot:latest .
  only:
    - main